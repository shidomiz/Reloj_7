Reloj 7 segmentos web modificada HTML 

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Reloj de 7 Segmentos</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --accent-color: #4f46e5;
            --text-color: #e4e4e7;
            --text-muted: #a1a1aa;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); padding: 20px; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; }
        header { text-align: center; margin-bottom: 25px; }
        header h1 { font-size: 24px; font-weight: 600; color: #fff; }
        header p { color: var(--text-muted); font-size: 14px; margin-top: 5px; }
        
        /* Tabs */
        .tabs { display: flex; background: var(--card-bg); padding: 5px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #27272a; }
        .tab-btn { flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 10px; font-size: 13px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .tab-btn.active { background: var(--accent-color); color: #fff; }
        
        /* Panels */
        .panel { background: var(--card-bg); border-radius: 16px; padding: 20px; border: 1px solid #27272a; display: none; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); }
        .panel.active { display: block; }
        
        /* Form controls */
        .section-title { font-size: 16px; font-weight: 500; margin-bottom: 15px; color: #fff; border-left: 4px solid var(--accent-color); padding-left: 8px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
        
        /* Custom UI Inputs */
        .picker-container { display: flex; align-items: center; gap: 15px; }
        input[type="color"] { -webkit-appearance: none; border: none; width: 50px; height: 50px; border-radius: 50px; cursor: pointer; background: transparent; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 2px solid #27272a; border-radius: 50px; }
        
        input[type="range"] { width: 100%; accent-color: var(--accent-color); margin-top: 5px; }
        input[type="number"], select { width: 100%; background: #27272a; border: 1px solid #3f3f46; border-radius: 8px; padding: 10px; color: #fff; font-size: 15px; outline: none; }
        
        /* Buttons */
        .btn { width: 100%; background: var(--accent-color); color: #fff; border: none; padding: 12px; font-size: 15px; font-weight: 500; border-radius: 8px; cursor: pointer; transition: background 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn:hover { background: #4338ca; }
        .btn-secondary { background: #27272a; border: 1px solid #3f3f46; }
        .btn-secondary:hover { background: #3f3f46; }
        
        /* Scoreboard Layout */
        .scoreboard-grid { display: flex; gap: 15px; margin-bottom: 15px; }
        .score-box { flex: 1; background: #27272a; p: 15px; border-radius: 12px; text-align: center; padding: 15px; }
        .score-actions { display: flex; gap: 10px; margin-top: 10px; }
        .score-btn { flex: 1; background: #3f3f46; border: none; color: #fff; padding: 8px; font-size: 16px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        
        .status-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 10px 20px; border-radius: 30px; font-size: 14px; font-weight: 500; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Smart LED Clock</h1>
        <p>Panel de Configuración General</p>
    </header>

		<div class="tabs">
   	   <button class="tab-btn active" onclick="switchTab(0)">Clock</button>
   	   <button class="tab-btn" onclick="switchTab(1)">Countdown</button>
    	   <button class="tab-btn" onclick="switchTab(2)">Temperature</button>
    	   <button class="tab-btn" onclick="switchTab(3)">Scoreboard</button>
    	   <button class="tab-btn" onclick="switchTab(4)">System</button>
	</div>

    <div id="panel-0" class="panel active">
        <div class="section-title">Ajustes Visuales</div>
        <div class="form-group">
            <label>Color de los Dígitos</label>
            <div class="picker-container">
                <input type="color" id="clockColor" value="#ff0000" onchange="sendColor()">
                <span var="text-muted" style="font-size: 14px;">Toca el círculo para cambiar</span>
            </div>
        </div>
        <div class="form-group">
            <label id="brightnessLabel">Brillo: 100%</label>
            <input type="range" id="brightness" min="10" max="255" value="255" oninput="updateBrightnessLabel(this.value)" onchange="sendBrightness(this.value)">
        </div>
        <div class="form-group">
            <label>Formato de Hora</label>
            <select id="hourFormat" onchange="sendHourFormat(this.value)">
                <option value="24">24 Horas</option>
                <option value="12">12 Horas</option>
            </select>
        </div>
        <div class="section-title">Sincronización</div>
        <button class="btn" onclick="syncTime()"> Sincronizar Hora del Celular</button>
    </div>

    <div id="panel-1" class="panel">
        <div class="section-title">Cuenta Regresiva</div>
        <div class="form-group">
            <label>Tiempo (Minutos)</label>
            <input type="number" id="cdMinutes" min="1" max="999" value="5">
        </div>
        <div class="form-group">
            <label>Color de Alerta</label>
            <input type="color" id="cdColor" value="#00ff00">
        </div>
        <button class="btn" onclick="startCountdown()">Iniciar Cuenta Regresiva</button>
        <button class="btn btn-secondary" style="margin-top: 10px;" onclick="returnToClock()">Volver al Reloj</button>
    </div>

    <div id="panel-2" class="panel">
        <div class="section-title">Sensor Térmico</div>
        <div class="form-group">
            <label>Corrección por Calibración (°C)</label>
            <input type="number" id="tempCorrection" step="0.5" value="-3.0">
        </div>
        <div class="form-group">
            <label>Escala de Medición</label>
            <select id="tempSymbol">
                <option value="12">Celsius (°C)</option>
                <option value="13">Fahrenheit (°F)</option>
            </select>
        </div>
        <button class="btn" onclick="sendTemperatureSettings()">Aplicar y Mostrar Temperatura</button>
        <button class="btn btn-secondary" style="margin-top: 10px;" onclick="returnToClock()">Volver al Reloj</button>
    </div>

    <div id="panel-3" class="panel">
        <div class="section-title">Scoreboard Digital</div>
        <div class="scoreboard-grid">
            <div class="score-box">
                <label style="color: #00ff00; font-weight: bold;">LOCAL</label>
                <input type="number" id="scoreLeft" value="0" min="0" max="99">
                <div class="score-actions">
                    <button class="score-btn" onclick="modifyScore('scoreLeft', 1)">+</button>
                    <button class="score-btn" onclick="modifyScore('scoreLeft', -1)">-</button>
                </div>
            </div>

<div id="panel-4" class="panel">

    <div class="section-title">
        System Information
    </div>

    <div id="systemInfo">

        Loading...

    </div>

    <br>

    <button class="btn btn-secondary"
            onclick="rebootESP()">

        🔄 Reboot ESP

    </button>

    <button class="btn btn-secondary"
            style="margin-top:10px"
            onclick="resetWiFi()">

        📶 Reset WiFi

    </button>

</div>

            <div class="score-box">
                <label style="color: #ff0000; font-weight: bold;">VISITA</label>
                <input type="number" id="scoreRight" value="0" min="0" max="99">
                <div class="score-actions">
                    <button class="score-btn" onclick="modifyScore('scoreRight', 1)">+</button>
                    <button class="score-btn" onclick="modifyScore('scoreRight', -1)">-</button>
                </div>
            </div>
        </div>
        <button class="btn" onclick="sendScoreboard()">Actualizar Marcador</button>
        <button class="btn btn-secondary" style="margin-top: 10px;" onclick="returnToClock()">Volver al Reloj</button>
    </div>
</div>

<div id="toast" class="status-toast">Comando enviado con éxito</div>

<script>
    // Cambio Dinámico de Pestañas
    function switchTab(idx) {
        document.querySelectorAll('.tab-btn').forEach((b, i) => b.classList.toggle('active', i === idx));
        document.querySelectorAll('.panel').forEach((p, i) => p.classList.toggle('active', i === idx));
    }

    function showToast(text) {
        const t = document.getElementById('toast');
        if(text) t.innerText = text;
        t.style.opacity = '1';
        setTimeout(() => t.style.opacity = '0', 2000);
    }

    function updateBrightnessLabel(val) {
        const pct = Math.round((val / 255) * 100);
        document.getElementById('brightnessLabel').innerText = `Brillo: ${pct}%`;
    }

    // Funciones de utilidad para convertir HEX de Color Picker a RGB
    function hexToRgb(hex) {
        const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return result ? { r: parseInt(result[1], 16), g: parseInt(result[2], 16), b: parseInt(result[3], 16) } : null;
    }

    // --- ENVIAR PETICIONES AJAX AL ESP8266 ---
    function postData(url, formData) {
        fetch(url, { method: 'POST', body: formData })
        .then(response => {
            if(response.ok) showToast();
        }).catch(err => console.error("Error:", err));
    }

    function sendColor() {
        const rgb = hexToRgb(document.getElementById('clockColor').value);
        if(!rgb) return;
        const data = new FormData();
        data.append('r', rgb.r); data.append('g', rgb.g); data.append('b', rgb.b);
        postData('/color', data);
    }

    function sendBrightness(val) {
        const data = new FormData();
        data.append('brightness', val);
        postData('/brightness', data);
    }

    function sendHourFormat(val) {
        const data = new FormData();
        data.append('hourformat', val);
        postData('/hourformat', data);
    }

    function returnToClock() {
        postData('/clock', new FormData());
        switchTab(0);
    }

    function syncTime() {
        const now = new Date();
        // Formatos esperados por el RTC del Sketch: "Dec 06 2009" y "12:34:56"
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const day = String(now.getDate()).padStart(2, '0');
        const dateStr = `${months[now.getMonth()]} ${day} ${now.getFullYear()}`;
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
        
        const data = new FormData();
        data.append('date', dateStr);
        data.append('time', timeStr);
        postData('/setdate', data);
        showToast("Hora sincronizada");
    }

    function startCountdown() {
        const mins = parseInt(document.getElementById('cdMinutes').value) || 5;
        const ms = mins * 60 * 1000;
        const rgb = hexToRgb(document.getElementById('cdColor').value);
        
        const data = new FormData();
        data.append('ms', ms);
        data.append('r', rgb.r); data.append('g', rgb.g); data.append('b', rgb.b);
        postData('/countdown', data);
    }

    function sendTemperatureSettings() {
        const data = new FormData();
        data.append('correction', document.getElementById('tempCorrection').value);
        data.append('symbol', document.getElementById('tempSymbol').value);
        postData('/temperature', data);
    }

    function modifyScore(id, amt) {
        const input = document.getElementById(id);
        let val = parseInt(input.value) + amt;
        if(val < 0) val = 0;
        if(val > 99) val = 99;
        input.value = val;
    }

    function sendScoreboard() {
        const rgbLeft = hexToRgb(document.getElementById('clockColor').value); // usa color base o podés Hardcodear
        const data = new FormData();
        data.append('left', document.getElementById('scoreLeft').value);
        data.append('right', document.getElementById('scoreRight').value);
        // Enviamos colores fijos o dinámicos para los equipos (Verde y Rojo por defecto como en el .ino)
        data.append('rl', 0); data.append('gl', 255); data.append('bl', 0);
        data.append('rr', 255); data.append('gr', 0); data.append('br', 0);
        postData('/scoreboard', data);
    }

function rebootESP() {

    fetch('/reboot', {
        method: 'POST'
    });

    showToast("Rebooting...");

}

function resetWiFi() {

    if (!confirm(
        "Delete WiFi settings?"
    )) return;

    fetch('/resetwifi', {
        method: 'POST'
    });

}

function updateSystemInfo() {

    fetch('/status')
    .then(r => r.json())
    .then(data => {

        document
        .getElementById(
            'systemInfo'
        ).innerHTML =

        `
        IP: ${data.ip}<br>
        Signal: ${data.rssi} dBm<br>
        RTC Temp: ${data.temp} °C<br>
        Free RAM: ${data.heap} bytes
        `;

    });

}

setInterval(
    updateSystemInfo,
    5000
);

updateSystemInfo();
</script>
</body>
</html>
