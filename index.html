<!doctype html>
<html lang="es">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Panel de Control - Reloj Inteligente</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    
    <style>
        :root {
            --bg-principal: #0f172a;
            --bg-tarjeta: #1e293b;
            --texto-principal: #f8fafc;
            --texto-secundario: #94a3b8;
            --borde-tarjeta: #334155;
            --color-accent: #3b82f6;
        }

        body {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            font-family: 'Inter', sans-serif;
            padding-bottom: 40px;
        }

        .navbar {
            background-color: var(--bg-tarjeta) !important;
            border-bottom: 1px solid var(--borde-tarjeta);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
            color: var(--color-accent) !important;
        }

        .nav-link {
            color: var(--texto-secundario) !important;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .nav-link.active {
            color: var(--texto-principal) !important;
            background-color: var(--borde-tarjeta);
        }

        .card {
            background-color: var(--bg-tarjeta);
            border: 1px solid var(--borde-tarjeta);
            border-radius: 16px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            margin-bottom: 24px;
            overflow: hidden;
        }

        .card-header-custom {
            padding: 20px 20px 0 20px;
            font-weight: 600;
            font-size: 1.1rem;
            color: var(--texto-principal);
        }

        .card-body {
            padding: 20px;
        }

        .form-label {
            color: var(--texto-secundario);
            font-weight: 500;
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .form-control, .form-select {
            background-color: var(--bg-principal);
            border: 1px solid var(--borde-tarjeta);
            color: var(--texto-principal);
            border-radius: 10px;
            padding: 10px 14px;
        }

        .form-control:focus, .form-select:focus {
            background-color: var(--bg-principal);
            color: var(--texto-principal);
            border-color: var(--color-accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        /* Input nativo de color estilizado de forma moderna */
        .color-picker-modern {
            padding: 5px;
            height: 50px;
            cursor: pointer;
        }

        .btn-primary-custom {
            background-color: var(--color-accent);
            border: none;
            color: white;
            font-weight: 600;
            border-radius: 10px;
            padding: 12px 20px;
            width: 100%;
            transition: all 0.2s ease;
        }

        .btn-primary-custom:hover {
            background-color: #2563eb;
            transform: translateY(-1px);
        }

        .btn-action {
            background-color: var(--bg-principal);
            border: 1px solid var(--borde-tarjeta);
            color: var(--texto-principal);
            font-weight: 600;
            border-radius: 10px;
            padding: 12px;
            transition: all 0.15s ease;
        }

        .btn-action:hover {
            background-color: var(--borde-tarjeta);
            color: var(--color-accent);
        }

        .score-display {
            font-size: 2.5rem;
            font-weight: 700;
            text-align: center;
            background: var(--bg-principal);
            border-radius: 12px;
            padding: 10px;
            border: 1px solid var(--borde-tarjeta);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">🕒 RELOJ SEVEN</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="nav navbar-nav ms-auto" id="clockTabs" role="tablist">
                    <li class="nav-item m-1">
                        <button class="nav-link active" id="home-tab" data-bs-toggle="tab" data-bs-target="#home" type="button" role="tab">General</button>
                    </li>
                    <li class="nav-item m-1">
                        <button class="nav-link" id="datetime-tab" data-bs-toggle="tab" data-bs-target="#datetime" type="button" role="tab">Fecha y Hora</button>
                    </li>
                    <li class="nav-item m-1">
                        <button class="nav-link" id="countdown-tab" data-bs-toggle="tab" data-bs-target="#countdown" type="button" role="tab">Cuenta Regresiva</button>
                    </li>
                    <li class="nav-item m-1">
                        <button class="nav-link" id="scoreboard-tab" data-bs-toggle="tab" data-bs-target="#scoreboard" type="button" role="tab">Marcador</button>
                    </li>
                    <li class="nav-item m-1">
                        <button class="nav-link" id="temperature-tab" data-bs-toggle="tab" data-bs-target="#temperature" type="button" role="tab">Temperatura</button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="tab-content" id="clockTabsContent">

            <div class="tab-pane fade show active" id="home" role="tabpanel">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header-custom">Color de los LEDs</div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="htmlColorPicker" class="form-label">Selecciona el color general</label>
                                    <input type="color" id="htmlColorPicker" class="form-control color-picker-modern" value="#ff0000">
                                </div>
                                <button type="button" class="btn btn-primary-custom" onclick="setColor()">Actualizar Color</button>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header-custom">Brillo del Display</div>
                            <div class="card-body">
                                <div class="mb-4">
                                    <label for="rangeBrightness" class="form-label">Intensidad</label>
                                    <input type="range" class="form-range" id="rangeBrightness" min="10" max="255" value="255">
                                </div>
                                <button type="button" class="btn btn-primary-custom" onclick="setBrightness()">Actualizar Brillo</button>
                            </div>
                        </div>

                        <div class="card">
                            <div class="card-header-custom">Formato de Hora</div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="hourFormat" class="form-label">Seleccione el modo</label>
                                    <select class="form-select" id="hourFormat">
                                        <option value="24">24 Horas</option>
                                        <option value="12">12 Horas (AM/PM)</option>
                                    </select>
                                </div>
                                <button type="button" class="btn btn-primary-custom" onclick="updateHourFormat()">Guardar Formato</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="datetime" role="tabpanel">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header-custom">Sincronización de Tiempo</div>
                            <div class="card-body">
                                <p class="text-muted small">El sistema configurará el módulo RTC interno utilizando la hora de este dispositivo.</p>
                                <div class="alert alert-info text-center fw-bold" id="currentDateTime" style="background-color: var(--bg-principal); border-color: var(--borde-tarjeta); color: var(--color-accent);">
                                    --/--/---- --:--:--
                                </div>
                                <button type="button" class="btn btn-primary-custom" onclick="setDateTime()">Sincronizar Hora Local</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="countdown" role="tabpanel">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header-custom">Temporizador / Countdown</div>
                            <div class="card-body">
                                <div class="row g-2 mb-3">
                                    <div class="col">
                                        <label class="form-label">Horas</label>
                                        <input type="number" class="form-control text-center" value="00" id="hours" min="0" max="23">
                                    </div>
                                    <div class="col">
                                        <label class="form-label">Minutos</label>
                                        <input type="number" class="form-control text-center" value="15" id="minutes" min="0" max="59">
                                    </div>
                                    <div class="col">
                                        <label class="form-label">Segundos</label>
                                        <input type="number" class="form-control text-center" value="00" id="seconds" min="0" max="59">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label class="form-label">Color del Contador</label>
                                    <input type="color" id="countdownColorPicker" class="form-control color-picker-modern" value="#00ff00">
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="button" class="btn btn-primary-custom" onclick="startCountdown()">Iniciar Cuenta Regresiva</button>
                                    <button type="button" class="btn btn-action" onclick="showClock()">Volver al Reloj</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="scoreboard" role="tabpanel">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header-custom">Control de Marcador</div>
                            <div class="card-body">
                                <div class="row text-center mb-3">
                                    <div class="col">
                                        <span class="badge bg-success mb-2">LOCAL</span>
                                        <button type="button" class="btn btn-action w-100 mb-2" onclick="upleft();">▲ Sumar</button>
                                        <div id="scoreboardLeft" class="score-display mb-2">20</div>
                                        <button type="button" class="btn btn-action w-100" onclick="downleft();">▼ Restar</button>
                                        <input type="color" id="scoreboardColorLeft" class="form-control color-picker-modern mt-2" value="#00ff00">
                                    </div>
                                    <div class="col">
                                        <span class="badge bg-danger mb-2">VISITANTE</span>
                                        <button type="button" class="btn btn-action w-100 mb-2" onclick="upright();">▲ Sumar</button>
                                        <div id="scoreboardRight" class="score-display mb-2">20</div>
                                        <button type="button" class="btn btn-action w-100" onclick="downright();">▼ Restar</button>
                                        <input type="color" id="scoreboardColorRight" class="form-control color-picker-modern mt-2" value="#ff0000">
                                    </div>
                                </div>
                                <div class="d-grid gap-2 mt-4">
                                    <button type="button" class="btn btn-primary-custom" onclick="showScoreboard()">Enviar Datos al Marcador</button>
                                    <button type="button" class="btn btn-action" onclick="showClock()">Volver al Reloj</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="tab-pane fade" id="temperature" role="tabpanel">
                <div class="row justify-content-center">
                    <div class="col-md-6">
                        <div class="card">
                            <div class="card-header-custom">Configuración de Temperatura</div>
                            <div class="card-body">
                                <div class="mb-3">
                                    <label for="temperatureDisplay" class="form-label">Escala de Medición</label>
                                    <select class="form-select" id="temperatureDisplay">
                                        <option value="12">Celsius (°C)</option>
                                        <option value="13">Fahrenheit (°F)</option>
                                    </select>
                                </div>
                                <div class="mb-4">
                                    <label for="temperatureCorrection" class="form-label">Calibración / Corrección offset</label>
                                    <div class="input-group">
                                        <input type="number" class="form-control" value="-3" id="temperatureCorrection">
                                        <span class="input-group-text" style="background-color: var(--bg-principal); border-color: var(--borde-tarjeta); color: var(--texto-secundario);">°C</span>
                                    </div>
                                </div>
                                <div class="d-grid gap-2">
                                    <button type="button" class="btn btn-primary-custom" onclick="showTemperature()">Mostrar Temperatura</button>
                                    <button type="button" class="btn btn-action" onclick="showClock()">Volver al Reloj</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // Esta función simula el comportamiento que tendrás que migrar a tu archivo 'js/index.js'
        // para leer los pickers HTML5 nativos en lugar del plugin minicolors antiguo.
        
        function obtenerRGB(idPicker) {
            const hex = document.getElementById(idPicker).value;
            return {
                r: parseInt(hex.slice(1, 3), 16),
                g: parseInt(hex.slice(3, 5), 16),
                b: parseInt(hex.slice(5, 7), 16)
            };
        }

        // Ejemplo de cómo adaptar las funciones js originales:
        function setColor() {
            const rgb = obtenerRGB('htmlColorPicker');
            // Aquí pones tu llamada AJAX original por POST usando Fetch o jQuery:
            // $.post('/color', { r: rgb.r, g: rgb.g, b: rgb.b });
            console.log("Enviando color:", rgb);
        }

        // Funciones auxiliares para la vista interna del marcador
        function upleft() { let e = document.getElementById('scoreboardLeft'); e.innerText = parseInt(e.innerText) + 1; }
        function downleft() { let e = document.getElementById('scoreboardLeft'); e.innerText = Math.max(0, parseInt(e.innerText) - 1); }
        function upright() { let e = document.getElementById('scoreboardRight'); e.innerText = parseInt(e.innerText) + 1; }
        function downright() { let e = document.getElementById('scoreboardRight'); e.innerText = Math.max(0, parseInt(e.innerText) - 1); }
        
        // Mantener el reloj web sincronizado visualmente en la pestaña
        setInterval(() => {
            const el = document.getElementById('currentDateTime');
            if(el) {
                const ahora = new Date();
                el.innerText = ahora.toLocaleString();
            }
        }, 1000);
    </script>
</body>

</html>
